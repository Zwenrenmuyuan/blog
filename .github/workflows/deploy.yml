name: 验证并部署到 GitHub Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: 质量验证
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 配置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 安装 Chromium
        run: npx playwright install --with-deps chromium

      - name: 检查类型与内容
        run: npm run check

      - name: 运行单元测试
        run: npm run test:unit

      - name: 验证开发模式内容
        run: npm run test:content

      - name: 运行生产端到端测试
        run: npm run test:e2e

  build:
    name: 构建生产站点
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 配置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 使用正式域名构建
        run: npm run build
        env:
          SITE_URL: https://blog.zwenrenmuyuanzyj.me/

      - name: 上传 GitHub Pages 产物
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: 发布到 GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages
      cancel-in-progress: false

    steps:
      - name: 发布站点
        id: deployment
        uses: actions/deploy-pages@v5
